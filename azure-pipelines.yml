trigger:
  - main

variables:
  vmImageName: 'ubuntu-latest'

  # Azure connections
  azureSubscription: 'miniwebapp-SC'
  dockerRegistryServiceConnection: '51b2aeef-68c2-4fe8-85b0-026edb42b92a'

  # ACR
  containerRegistry: 'miniwebappcr.azurecr.io'
  imageRepository: 'ecommerceminiapp'
  tag: '$(Build.BuildId)'
  latestTag: 'latest'

  # App Services
  backendWebAppName: 'BE-webapp'
  frontendWebAppName: 'FE-webapp'
  resourceGroupName: 'mini-web-app'

  # Replace if you use a custom domain
  backendBaseUrl: 'https://be-webapp-a7bsbgcaeabtexg5.canadacentral-01.azurewebsites.net'

stages:
- stage: Build_Backend
  displayName: Build and Push Backend
  jobs:
  - job: BuildBackend
    displayName: Build Backend Image
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build and push backend image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)-server'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/server/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)/server'
        tags: |
          $(tag)
          $(latestTag)

- stage: Build_Frontend
  displayName: Build and Push Frontend
  dependsOn: Build_Backend
  jobs:
  - job: BuildFrontend
    displayName: Build Frontend Image
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build frontend image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)-client'
        command: 'build'
        Dockerfile: '$(Build.SourcesDirectory)/client/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)/client'
        arguments: '--build-arg VITE_API_BASE_URL=$(backendBaseUrl)'
        tags: |
          $(tag)
          $(latestTag)

    - task: Docker@2
      displayName: Push frontend image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)-client'
        command: 'push'
        tags: |
          $(tag)
          $(latestTag)

- stage: Deploy_Backend
  displayName: Deploy Backend to App Service
  dependsOn: Build_Frontend
  jobs:
  - job: DeployBackend
    displayName: Deploy Backend Container
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureCLI@2
      displayName: Set backend app settings
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          az webapp config appsettings set \
            --resource-group "$(resourceGroupName)" \
            --name "$(backendWebAppName)" \
            --settings WEBSITES_PORT=5000 PORT=5000

    - task: AzureWebAppContainer@1
      displayName: Deploy backend image to Azure App Service
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(backendWebAppName)'
        containers: '$(containerRegistry)/$(imageRepository)-server:$(tag)'

- stage: Deploy_Frontend
  displayName: Deploy Frontend to App Service
  dependsOn: Deploy_Backend
  jobs:
  - job: DeployFrontend
    displayName: Deploy Frontend Container
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy frontend image to Azure App Service
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(frontendWebAppName)'
        containers: '$(containerRegistry)/$(imageRepository)-client:$(tag)'
