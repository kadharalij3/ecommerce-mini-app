trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '51b2aeef-68c2-4fe8-85b0-026edb42b92a'
  imageRepository: 'ecommerceminiapp'
  containerRegistry: 'miniwebappcr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/client/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build_Backend
  displayName: Backend Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push Backend an image to container registry
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)-server'
        command: 'buildAndPush'
        Dockerfile: '**/server/Dockerfile'
        tags: '$(tag)'

- stage: Build_Frontend
  displayName: Frontend Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push Frontend an image to container registry
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)-client'
        command: 'buildAndPush'
        Dockerfile: '**/client/Dockerfile'
        tags: '$(tag)'