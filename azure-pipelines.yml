trigger:
- main

variables:
  azureSubscription: '6c9ce6b0-500c-45f9-b6a2-afdccf688b22'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20.x'
  appName: 'testwebabb'
  frontendFolder: 'client'
  backendFolder: 'server'

stages:
- stage: Build_And_Deploy
  displayName: Build and deploy full app
  jobs:
  - job: BuildDeploy
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd "$(System.DefaultWorkingDirectory)/$(frontendFolder)"
        npm ci
        npm run build
      displayName: Build frontend

    - script: |
        mkdir -p "$(System.DefaultWorkingDirectory)/$(backendFolder)/public"
        cp -r "$(System.DefaultWorkingDirectory)/$(frontendFolder)/dist/"* "$(System.DefaultWorkingDirectory)/$(backendFolder)/public/"
      displayName: Copy frontend build into backend public

    - script: |
        cd "$(System.DefaultWorkingDirectory)/$(backendFolder)"
        npm ci
        npm run test --if-present
      displayName: Install backend dependencies

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/$(backendFolder)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true
      displayName: Archive app

    - task: AzureWebApp@1
      inputs:
        azureSubscription: '$(azureSubscription)'
        appType: 'webAppLinux'
        appName: '$(appName)'
        runtimeStack: 'NODE|20-lts'
        package: '$(Build.ArtifactStagingDirectory)/app.zip'
        startupCommand: 'npm start'
      displayName: Deploy app
