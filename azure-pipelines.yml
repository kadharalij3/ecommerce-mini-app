# Code Generated by Sidekick is for learning and experimentation purposes only.
trigger:
- main

variables:
  azureSubscription: '6c9ce6b0-500c-45f9-b6a2-afdccf688b22'
  webAppName: 'testwebabb'
  environmentName: 'testwebabb'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20.x'
  clientFolder: 'client'
  serverFolder: 'server'

stages:
- stage: Build
  displayName: Build and package full app
  jobs:
  - job: Build
    displayName: Build full app
    pool:
      vmImage: $(vmImageName)

    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd "$(System.DefaultWorkingDirectory)/$(clientFolder)"
        npm ci
        npm run build
      displayName: Build frontend

    - script: |
        cd "$(System.DefaultWorkingDirectory)/$(serverFolder)"
        npm ci
        rm -rf public
        mkdir -p public
        cp -R "$(System.DefaultWorkingDirectory)/$(clientFolder)/dist/." public/
        ls -la
        ls -la public
      displayName: Prepare server package with frontend

    - task: ArchiveFiles@2
      displayName: Archive server package
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/$(serverFolder)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/site.zip'
        replaceExistingArchive: true

    - upload: '$(Build.ArtifactStagingDirectory)/site.zip'
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: Azure Web App Deploy
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              runtimeStack: 'NODE|20-lts'
              package: '$(Pipeline.Workspace)/drop/site.zip'
              startupCommand: 'npm start'
