trigger:
- main

variables:
  azureSubscription: '6c9ce6b0-500c-45f9-b6a2-afdccf688b22'
  webAppName: 'testwebabb'
  environmentName: 'testwebabb'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        ls -la
        cat package.json
        npm ci
        npm run build
        npm run test --if-present
        echo "After build:"
        ls -la
        find $(System.DefaultWorkingDirectory) -maxdepth 3 -type d \( -name dist -o -name build \)
      displayName: 'npm install, build and test'

    - task: ArchiveFiles@2
      displayName: 'Archive dist folder'
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/dist'
        includeRootFolder: true
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/site.zip'
        replaceExistingArchive: true

    - upload: '$(Build.ArtifactStagingDirectory)/site.zip'
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: testwebabb'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              runtimeStack: 'NODE|20-lts'
              package: '$(Pipeline.Workspace)/drop/site.zip'
              startupCommand: 'pm2 serve /home/site/wwwroot/dist --no-daemon --spa'
