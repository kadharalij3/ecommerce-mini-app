# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: 'miniwebapp-SC'
  resourceGroup: 'mini-web-app'
  location: 'canadacentral'
  acrName: 'miniwebapp'
  appServicePlan: 'asp-ecommerce-miniapp'
  backendAppName: 'BE-miniwebapp'
  frontendAppName: 'FE-miniwebapp'
  backendRepo: 'ecommerce-server'
  frontendRepo: 'ecommerce-client'
  backendPort: '5000'
  frontendPort: '80'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: BuildAndDeploy
  displayName: Build and deploy containers
  jobs:
  - job: Deploy
    displayName: Build, push, deploy
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Get ACR login server and app URLs
      inputs:
        azureSubscription: 'miniwebapp-SC'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          set -e
          ACR_LOGIN_SERVER=$(az acr show -n $(acrName) -g $(resourceGroup) --query loginServer -o tsv)
          echo "##vso[task.setvariable variable=ACR_LOGIN_SERVER]$ACR_LOGIN_SERVER"
          echo "##vso[task.setvariable variable=BACKEND_URL]https://$(backendAppName).azurewebsites.net"
          echo "##vso[task.setvariable variable=FRONTEND_URL]https://$(frontendAppName).azurewebsites.net"

    - task: Docker@2
      displayName: Build and push backend
      inputs:
        containerRegistry: 'miniwebapp'
        repository: '$(backendRepo)'
        command: 'buildAndPush'
        Dockerfile: 'backend/Dockerfile'
        buildContext: 'backend'
        tags: |
          $(Build.BuildId)
          latest

    - task: Docker@2
      displayName: Build and push frontend
      inputs:
        containerRegistry: 'miniwebapp'
        repository: '$(frontendRepo)'
        command: 'buildAndPush'
        Dockerfile: 'frontend/Dockerfile'
        buildContext: 'frontend'
        tags: |
          $(Build.BuildId)
          latest

    - task: AzureCLI@2
      displayName: Configure backend container
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          set -e
          az webapp config container set \
            --name $(backendAppName) \
            --resource-group $(resourceGroup) \
            --docker-custom-image-name $(ACR_LOGIN_SERVER)/$(backendRepo):$(Build.BuildId) \
            --docker-registry-server-url https://$(ACR_LOGIN_SERVER)

          az webapp config appsettings set \
            --name $(backendAppName) \
            --resource-group $(resourceGroup) \
            --settings WEBSITES_PORT=$(backendPort) ALLOWED_ORIGIN=$(FRONTEND_URL)

    - task: AzureCLI@2
      displayName: Configure frontend container
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          set -e
          az webapp config container set \
            --name $(frontendAppName) \
            --resource-group $(resourceGroup) \
            --docker-custom-image-name $(ACR_LOGIN_SERVER)/$(frontendRepo):$(Build.BuildId) \
            --docker-registry-server-url https://$(ACR_LOGIN_SERVER)

          az webapp config appsettings set \
            --name $(frontendAppName) \
            --resource-group $(resourceGroup) \
            --settings WEBSITES_PORT=$(frontendPort)

    - task: AzureCLI@2
      displayName: Restart apps
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # Code Generated by Sidekick is for learning and experimentation purposes only.
          az webapp restart --name $(backendAppName) --resource-group $(resourceGroup)
          az webapp restart --name $(frontendAppName) --resource-group $(resourceGroup)