trigger:
- main

variables:
  azureSubscription: '6c9ce6b0-500c-45f9-b6a2-afdccf688b22'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20.x'

  frontendAppName: 'testwebabb'
  backendAppName: 'testwebabb'

  frontendEnvironment: 'testwebabb'
  backendEnvironment: 'testwebabb'

  frontendFolder: 'client'
  backendFolder: 'server'

stages:
- stage: Build_Backend
  displayName: Build backend
  jobs:
  - job: BuildBackend
    displayName: Build backend
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        pwd
        ls -la
        ls -la "$(System.DefaultWorkingDirectory)/$(backendFolder)"
        cat "$(System.DefaultWorkingDirectory)/$(backendFolder)/package.json"
        npm ci
        npm run test --if-present
      displayName: Install backend dependencies
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(backendFolder)'

    - task: ArchiveFiles@2
      displayName: Archive backend folder
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/$(backendFolder)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
        replaceExistingArchive: true

    - upload: '$(Build.ArtifactStagingDirectory)/backend.zip'
      artifact: backend-drop

- stage: Deploy_Backend
  displayName: Deploy backend
  dependsOn: Build_Backend
  condition: succeeded()
  jobs:
  - deployment: DeployBackend
    displayName: Deploy backend
    environment: $(backendEnvironment)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: backend-drop

          - task: AzureWebApp@1
            displayName: Azure Web App Deploy backend
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(backendAppName)'
              runtimeStack: 'NODE|20-lts'
              package: '$(Pipeline.Workspace)/backend-drop/backend.zip'
              startupCommand: 'npm start'

- stage: Build_Frontend
  displayName: Build frontend
  dependsOn: Deploy_Backend
  condition: succeeded()
  jobs:
  - job: BuildFrontend
    displayName: Build frontend
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        pwd
        ls -la
        ls -la "$(System.DefaultWorkingDirectory)/$(frontendFolder)"
        cat "$(System.DefaultWorkingDirectory)/$(frontendFolder)/package.json"
        npm ci
        npm run build
        npm run test --if-present
        ls -la
        ls -la dist
      displayName: npm install, build and test
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(frontendFolder)'
      env:
        VITE_API_BASE_URL: 'https://testwebabb-api.azurewebsites.net'

    - task: Bash@3
      displayName: Archive dist folder
      inputs:
        targetType: inline
        script: |
          set -e
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

          cd "$(System.DefaultWorkingDirectory)/$(frontendFolder)"
          test -d dist
          zip -r "$(Build.ArtifactStagingDirectory)/site.zip" dist

    - upload: '$(Build.ArtifactStagingDirectory)/site.zip'
      artifact: frontend-drop

- stage: Deploy_Frontend
  displayName: Deploy frontend
  dependsOn: Build_Frontend
  condition: succeeded()
  jobs:
  - deployment: DeployFrontend
    displayName: Deploy frontend
    environment: $(frontendEnvironment)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: frontend-drop

          - task: AzureWebApp@1
            displayName: Azure Web App Deploy frontend
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(frontendAppName)'
              runtimeStack: 'NODE|20-lts'
              package: '$(Pipeline.Workspace)/frontend-drop/site.zip'
              startupCommand: 'pm2 serve /home/site/wwwroot/dist --no-daemon --spa'
