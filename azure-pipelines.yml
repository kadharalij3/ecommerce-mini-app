trigger:
- main

variables:
  azureSubscription: '6c9ce6b0-500c-45f9-b6a2-afdccf688b22'
  webAppName: 'testwebabb'
  environmentName: 'testwebabb'
  vmImageName: 'ubuntu-latest'
  nodeVersion: '20.x'
  appFolder: 'client'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        pwd
        ls -la
        ls -la "$(System.DefaultWorkingDirectory)/$(appFolder)"
        cat "$(System.DefaultWorkingDirectory)/$(appFolder)/package.json"
        npm ci
        npm run build
        npm run test --if-present
        ls -la
        ls -la dist
      displayName: 'npm install, build and test'
      workingDirectory: '$(System.DefaultWorkingDirectory)/$(appFolder)'

    - task: Bash@3
      displayName: 'Archive dist folder'
      inputs:
        targetType: 'inline'
        script: |
          set -e
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip
          fi

          cd "$(System.DefaultWorkingDirectory)/$(appFolder)"
          test -d dist
          zip -r "$(Build.ArtifactStagingDirectory)/site.zip" dist

    - upload: '$(Build.ArtifactStagingDirectory)/site.zip'
      artifact: drop

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Deploy
    displayName: Deploy
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: testwebabb'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              runtimeStack: 'NODE|20-lts'
              package: '$(Pipeline.Workspace)/drop/site.zip'
              startupCommand: 'pm2 serve /home/site/wwwroot/dist --no-daemon --spa'
