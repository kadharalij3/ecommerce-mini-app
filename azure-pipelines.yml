# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  azureServiceConnection: 'miniwebapp-SC'
  resourceGroup: 'mini-web-app'
  location: 'canadacentral'
  acrName: 'miniwebapp'
  appServicePlan: 'asp-ecommerce-miniapp'
  backendAppName: 'BE-miniwebapp'
  frontendAppName: 'FE-miniwebapp'
  backendRepo: 'ecommerce-server'
  frontendRepo: 'ecommerce-client'
  backendPort: '5000'
  frontendPort: '80'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)


stages:
  - stage: Provision_Build_Deploy
    displayName: Provision, Build, Push, Deploy
    jobs:
      - job: end_to_end
        displayName: End-to-end deployment
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Provision Azure resources
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Code Generated by Sidekick is for learning and experimentation purposes only.
                set -euo pipefail

                az group create \
                  --name "$(resourceGroup)" \
                  --location "$(location)"

                az acr create \
                  --resource-group "$(resourceGroup)" \
                  --name "$(acrName)" \
                  --sku Basic \
                  --admin-enabled false || true

                az appservice plan create \
                  --name "$(appServicePlan)" \
                  --resource-group "$(resourceGroup)" \
                  --location "$(location)" \
                  --is-linux \
                  --sku B1 || true

                az webapp create \
                  --resource-group "$(resourceGroup)" \
                  --plan "$(appServicePlan)" \
                  --name "$(backendAppName)" \
                  --deployment-container-image-name "mcr.microsoft.com/azuredocs/aci-helloworld" || true

                az webapp create \
                  --resource-group "$(resourceGroup)" \
                  --plan "$(appServicePlan)" \
                  --name "$(frontendAppName)" \
                  --deployment-container-image-name "mcr.microsoft.com/azuredocs/aci-helloworld" || true

                az webapp identity assign \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)"

                az webapp identity assign \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)"

                ACR_ID=$(az acr show \
                  --resource-group "$(resourceGroup)" \
                  --name "$(acrName)" \
                  --query id -o tsv)

                BACKEND_PRINCIPAL_ID=$(az webapp identity show \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)" \
                  --query principalId -o tsv)

                FRONTEND_PRINCIPAL_ID=$(az webapp identity show \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)" \
                  --query principalId -o tsv)

                az role assignment create \
                  --assignee-object-id "$BACKEND_PRINCIPAL_ID" \
                  --assignee-principal-type ServicePrincipal \
                  --role AcrPull \
                  --scope "$ACR_ID" || true

                az role assignment create \
                  --assignee-object-id "$FRONTEND_PRINCIPAL_ID" \
                  --assignee-principal-type ServicePrincipal \
                  --role AcrPull \
                  --scope "$ACR_ID" || true

                ACR_LOGIN_SERVER=$(az acr show \
                  --resource-group "$(resourceGroup)" \
                  --name "$(acrName)" \
                  --query loginServer -o tsv)

                echo "##vso[task.setvariable variable=ACR_LOGIN_SERVER]$ACR_LOGIN_SERVER"
                echo "##vso[task.setvariable variable=BACKEND_URL]https://$(backendAppName).azurewebsites.net"
                echo "##vso[task.setvariable variable=FRONTEND_URL]https://$(frontendAppName).azurewebsites.net"

          - task: AzureCLI@2
            displayName: Build and push backend + frontend images
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Code Generated by Sidekick is for learning and experimentation purposes only.
                set -euo pipefail

                az acr login --name "$(acrName)"

                BACKEND_IMAGE="$(ACR_LOGIN_SERVER)/$(backendRepo):$(Build.BuildId)"
                FRONTEND_IMAGE="$(ACR_LOGIN_SERVER)/$(frontendRepo):$(Build.BuildId)"

                docker build \
                  -f backend/Dockerfile \
                  -t "$BACKEND_IMAGE" \
                  ./backend

                docker push "$BACKEND_IMAGE"

                docker build \
                  -f frontend/Dockerfile \
                  --build-arg VITE_API_BASE_URL="$(BACKEND_URL)" \
                  -t "$FRONTEND_IMAGE" \
                  ./frontend

                docker push "$FRONTEND_IMAGE"

                echo "##vso[task.setvariable variable=BACKEND_IMAGE]$BACKEND_IMAGE"
                echo "##vso[task.setvariable variable=FRONTEND_IMAGE]$FRONTEND_IMAGE"

          - task: AzureCLI@2
            displayName: Configure App Services to use ACR images
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Code Generated by Sidekick is for learning and experimentation purposes only.
                set -euo pipefail

                az webapp config container set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)" \
                  --docker-custom-image-name "$(BACKEND_IMAGE)" \
                  --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)"

                az webapp config set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)" \
                  --generic-configurations '{"acrUseManagedIdentityCreds": true}'

                az webapp config appsettings set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)" \
                  --settings \
                    WEBSITES_PORT=$(backendPort) \
                    ALLOWED_ORIGIN=$(FRONTEND_URL)

                az webapp config container set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)" \
                  --docker-custom-image-name "$(FRONTEND_IMAGE)" \
                  --docker-registry-server-url "https://$(ACR_LOGIN_SERVER)"

                az webapp config set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)" \
                  --generic-configurations '{"acrUseManagedIdentityCreds": true}'

                az webapp config appsettings set \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)" \
                  --settings \
                    WEBSITES_PORT=$(frontendPort)

                az webapp restart \
                  --resource-group "$(resourceGroup)" \
                  --name "$(backendAppName)"

                az webapp restart \
                  --resource-group "$(resourceGroup)" \
                  --name "$(frontendAppName)"

          - task: AzureCLI@2
            displayName: Smoke test
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # Code Generated by Sidekick is for learning and experimentation purposes only.
                set -euo pipefail

                echo "Waiting for containers to start..."
                sleep 90

                echo "Frontend:"
                curl -I "$(FRONTEND_URL)"

                echo "Backend:"
                curl -I "$(BACKEND_URL)"