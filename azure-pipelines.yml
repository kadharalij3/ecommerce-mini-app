trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  azureSubscription: 'Azure subscription 1 (ad8f925e-d2a1-4d4a-bb51-3421875c3089)'
  webAppName: 'testwebabb'
  runtimeStack: 'NODE|24-lts'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: BuildJob
        displayName: Build Vite app
        steps:
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              npm ci
              npm run build
            displayName: Install and build
            env:
              VITE_API_URL: $(VITE_API_URL)

          - task: ArchiveFiles@2
            displayName: Archive dist folder
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)/dist'
              includeRootFolder: true
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/site.zip'
              replaceExistingArchive: true

          - publish: '$(Build.ArtifactStagingDirectory)/site.zip'
            artifact: drop
            displayName: Publish deployment package

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployJob
        displayName: Deploy to Azure App Service
        steps:
          - download: current
            artifact: drop
            displayName: Download artifact

          - task: AzureWebApp@1
            displayName: Deploy Azure Web App
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(webAppName)'
              package: '$(Pipeline.Workspace)/drop/site.zip'
              deploymentMethod: 'zipDeploy'
              runtimeStack: '$(runtimeStack)'
              startupCommand: 'pm2 serve /home/site/wwwroot/dist --no-daemon --spa'
