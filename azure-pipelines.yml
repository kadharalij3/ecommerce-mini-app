# Code Generated by Sidekick is for learning and experimentation purposes only.
trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrServiceConnection: 'miniwebapp'
  azureSubscription: 'Azure subscription 1 (ad8f925e-d2a1-4d4a-bb51-3421875c3089)'

  acrLoginServer: 'miniwebapp.azurecr.io'

  backendRepository: 'ecommerce-server'
  frontendRepository: 'ecommerce-client'

  backendDockerfile: 'server/Dockerfile'
  frontendDockerfile: 'client/Dockerfile'

  backendWebAppName: 'webappbackend'
  frontendWebAppName: 'webappfront'

  backendUrl: 'https://webappbackend-czekhed5dxffcnbt.canadacentral-01.azurewebsites.net'
  tag: '$(Build.BuildId)'

stages:
- stage: Build_Backend
  displayName: Build and Push Backend
  jobs:
  - job: BuildBackend
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build backend image
      inputs:
        command: build
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(backendRepository)'
        dockerfile: '$(backendDockerfile)'
        buildContext: '$(Build.SourcesDirectory)/server'
        tags: |
          $(tag)

    - task: Docker@2
      displayName: Push backend image
      inputs:
        command: push
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(backendRepository)'
        tags: |
          $(tag)

- stage: Deploy_Backend
  displayName: Deploy Backend
  dependsOn: Build_Backend
  jobs:
  - job: DeployBackend
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy backend container
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(backendWebAppName)'
        containers: '$(acrLoginServer)/$(backendRepository):$(tag)'

- stage: Build_Frontend
  displayName: Build and Push Frontend
  dependsOn: Deploy_Backend
  jobs:
  - job: BuildFrontend
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build frontend image
      inputs:
        command: build
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(frontendRepository)'
        dockerfile: '$(frontendDockerfile)'
        buildContext: '$(Build.SourcesDirectory)/client'
        tags: |
          $(tag)
        arguments: '--build-arg VITE_API_BASE_URL=$(backendUrl)'

    - task: Docker@2
      displayName: Push frontend image
      inputs:
        command: push
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(frontendRepository)'
        tags: |
          $(tag)

- stage: Deploy_Frontend
  displayName: Deploy Frontend
  dependsOn: Build_Frontend
  jobs:
  - job: DeployFrontend
    steps:
    - task: AzureWebAppContainer@1
      displayName: Deploy frontend container
      inputs:
        azureSubscription: '$(azureSubscription)'
        appName: '$(frontendWebAppName)'
        containers: '$(acrLoginServer)/$(frontendRepository):$(tag)'
